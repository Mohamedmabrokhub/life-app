  .hist{margin-top:14px;} .hist .h{display:flex;justify-content:space-between;font-size:13px;color:var(--muted);padding:8px 2px;border-bottom:1px solid #22262F;}

  .nav{position:fixed;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;background:#12141C;border-top:1px solid var(--line);display:flex;padding:7px 0 max(7px,env(safe-area-inset-bottom));z-index:40;}
  .nav button{flex:1;background:none;border:none;color:var(--muted);font-family:inherit;font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;transition:transform .1s;}
  .nav button .ic{font-size:19px;line-height:1;} .nav button:active{transform:translateY(-2px);} .nav button.active{color:var(--gold-hi);font-weight:700;}

  .modal{position:fixed;inset:0;background:rgba(6,8,14,.7);display:none;align-items:flex-end;justify-content:center;z-index:60;} .modal.show{display:flex;}
  .sheet{background:var(--card2);width:100%;max-width:480px;border-radius:20px 20px 0 0;padding:20px 18px 26px;border-top:1px solid var(--line);animation:slideup .25s ease;}
  .sheet h3{font-size:17px;margin-bottom:14px;}

  .sheet input::placeholder{color:#565C68;} .sheet .acts{display:flex;gap:10px;margin-top:6px;}
  .sheet .acts button{flex:1;padding:12px;border-radius:11px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;border:none;}
  .sheet .cancel{background:#2A2E3A;color:var(--cream);} .sheet .ok{background:linear-gradient(135deg,var(--gold-hi),var(--gold));color:#1A1A1A;}
  .confetti{position:fixed;top:-10px;width:9px;height:14px;z-index:100;pointer-events:none;border-radius:2px;}
  .ring-rot{transform-origin:24px 24px;animation:spin 9s linear infinite;} .pulse{stroke-dasharray:64;stroke-dashoffset:64;animation:draw 2.4s ease-in-out infinite;}
  @keyframes pop{0%{transform:scale(.5)}60%{transform:scale(1.25)}100%{transform:scale(1)}}
  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes shimmer{to{background-position:-220% 0}} @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes draw{0%{stroke-dashoffset:64}45%{stroke-dashoffset:0}55%{stroke-dashoffset:0}100%{stroke-dashoffset:-64}}
  @keyframes fall{to{transform:translateY(105vh) rotate(720deg);opacity:.9}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<div id="lockScreen" style="position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;">
  <svg width="80" height="80" viewBox="0 0 48 48" style="margin-bottom:24px;filter:drop-shadow(0 0 12px rgba(212,175,55,.4));">
    <defs><linearGradient id="goldL" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#E8CC7A"/><stop offset=".5" stop-color="#D4AF37"/><stop offset="1" stop-color="#B8860B"/></linearGradient></defs>
    <circle cx="24" cy="24" r="20" fill="none" stroke="url(#goldL)" stroke-width="2.5"/>
    <path d="M24 12v24M12 24h24" stroke="url(#goldL)" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="24" cy="24" r="6" fill="none" stroke="url(#goldL)" stroke-width="2"/>
  </svg>
  <h2 style="font-family:'Cairo',sans-serif;font-size:22px;color:var(--gold-hi);margin-bottom:8px;">Life • الحياة</h2>
  <p style="color:var(--muted);font-size:14px;margin-bottom:28px;">أدخل كلمة المرور للدخول</p>
  <input id="passInput" type="password" inputmode="numeric" maxlength="10" placeholder="•••••••" style="width:100%;max-width:280px;padding:14px 18px;border:1.5px solid var(--gold-dim);border-radius:14px;font-size:20px;text-align:center;letter-spacing:8px;background:#0E1017;color:var(--gold-hi);font-family:'Cairo',sans-serif;outline:none;transition:border-color .2s;">
  <p id="passError" style="color:var(--danger);font-size:13px;margin-top:12px;opacity:0;transition:opacity .2s;">كلمة المرور غير صحيحة</p>
  <button onclick="checkPass()" style="margin-top:20px;width:100%;max-width:280px;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--gold-hi),var(--gold));color:#1A1A1A;font-family:'Cairo',sans-serif;font-weight:700;font-size:16px;cursor:pointer;">دخول</button>
</div>
<script>
(function(){
  const saved = localStorage.getItem('waey_unlocked');
  const today = new Date().toDateString();
  if(saved === today){
    document.getElementById('lockScreen').style.display='none';
  }
})();
function checkPass(){
  const input = document.getElementById('passInput').value.trim();
  if(input === '1012164'){
    localStorage.setItem('waey_unlocked', new Date().toDateString());
    document.getElementById('lockScreen').style.opacity='0';
    document.getElementById('lockScreen').style.transition='opacity .4s ease';
    setTimeout(()=>document.getElementById('lockScreen').style.display='none', 400);
  } else {
    const err = document.getElementById('passError');
    err.style.opacity='1';
    document.getElementById('passInput').style.borderColor='var(--danger)';
    setTimeout(()=>{err.style.opacity='0';document.getElementById('passInput').style.borderColor='var(--gold-dim)';}, 2000);
  }
}
document.getElementById('passInput').addEventListener('keypress', function(e){if(e.key==='Enter')checkPass();});
</script>

let lang=DB.get('lang','ar');
function T(k){return L[lang][k]!==undefined?L[lang][k]:L.ar[k];}
function cur(n){return lang==='ar'?Number(n).toLocaleString('en-US')+' ج':'EGP '+Number(n).toLocaleString('en-US');}
function fdate(ts){return new Date(ts).toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{day:'numeric',month:'long'});}
function monthLabel(m){if(m===ymNow||m<ymNow)return T('thisMonth');if(m===ymNext)return T('nextMonth');const p=m.split('-');return new Date(+p[0],+p[1]-1,1).toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{month:'long',year:'numeric'});}

DB.set('units',units);
orients=orients.filter(o=>o.ts>Date.now()-31*864e5);DB.set('orients',orients);

if(din.date!==new Date().toDateString()){din={date:new Date().toDateString(),items:{}};DB.set('din',din);}

function party(){const cols=['#D4AF37','#2FA37F','#E8CC7A','#3FC79B','#FFF6DC'];
  for(let i=0;i<46;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=cols[i%cols.length];
    c.style.animation=`fall ${0.9+Math.random()*0.9}s ${Math.random()*0.3}s ease-in forwards`;document.body.appendChild(c);setTimeout(()=>c.remove(),2200);}}

let mOkFn=null;
function openModal(title,p1,p2,onOk,hide2,pre1){document.getElementById('mTitle').textContent=title;
  const i1=document.getElementById('mIn1'),i2=document.getElementById('mIn2');
  i1.placeholder=p1;i1.value=pre1||'';i2.placeholder=p2||'';i2.value='';i2.style.display=hide2?'none':'block';mOkFn=onOk;
  document.getElementById('mOk').textContent=T('save');document.getElementById('mCancel').textContent=T('cancel');
  document.getElementById('modal').classList.add('show');setTimeout(()=>i1.focus(),50);}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('mOk').onclick=()=>{const v1=document.getElementById('mIn1').value.trim(),v2=document.getElementById('mIn2').value.trim();if(mOkFn)mOkFn(v1,v2);};

/* ============ FINANCE ============ */
function comm(u){return Math.round(u.value*u.rate/100);}
function unitCard(u){const c=comm(u);let btns='';
  if(u.status==='pending')btns=`<button class="ubtn pay" onclick="markPaid('${u.id}')">${T('markPaid')}</button><button class="ubtn delay" onclick="markDelayed('${u.id}')">${T('markDelayed')}</button>`;
  else if(u.status==='delayed')btns=`<button class="ubtn pay" onclick="markPaid('${u.id}')">${T('markPaid')}</button><button class="ubtn" onclick="unDelay('${u.id}')">${T('undoDelay')}</button>`;
  else btns=`<button class="ubtn" onclick="unPay('${u.id}')">${T('undo')}</button>`;
  const cm=u.status==='delayed'?`<div class="comment ${u.comment?'':'empty2'}" onclick="editComment('${u.id}')">💬 ${u.comment?esc(u.comment):T('addReason')}</div>`:'';
  return `<div class="unit"><div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div><div class="u-name">${esc(u.name)}</div><div class="u-sub">${Number(u.value).toLocaleString('en-US')}${T('cur')} × ${u.rate}%</div></div>
    <span class="xdel" onclick="delUnit('${u.id}')">✕</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px"><div class="u-com">${cur(c)}</div><span class="duetag">${monthLabel(u.dueMonth)}</span></div>
    ${cm}<div class="ubtns">${btns}</div></div>`;}
function section(title,arr){if(!arr.length)return '';return `<div class="secttl">${title}</div>`+arr.map(unitCard).join('');}

function renderMoney(){const el=document.getElementById('tab-money');
  let net=0,recv=0,delT=0,salT=0;
  units.forEach(u=>{const c=comm(u);if(u.status==='pending')net+=c;else if(u.status==='paid')recv+=c;else delT+=c;});
  salaries.forEach(s=>salT+=Number(s.amount));
  const pend=units.filter(u=>u.status==='pending');
  const thisB=pend.filter(u=>u.dueMonth<=ymNow),nextB=pend.filter(u=>u.dueMonth===ymNext),laterB=pend.filter(u=>u.dueMonth>ymNext);
  const delayed=units.filter(u=>u.status==='delayed'),paidU=units.filter(u=>u.status==='paid');
  const expThis=salT+thisB.reduce((a,u)=>a+comm(u),0);

  let h=`<div class="rowhead"><h2>${T('financeTitle')}</h2></div>
    <div class="dash">
      <div class="dcard gold"><div class="lbl">${T('monthlySalary')}</div><div class="v">${salT.toLocaleString('en-US')}<small>${T('cur')}</small></div></div>
      <div class="dcard"><div class="lbl">${T('netExpected')}</div><div class="v" style="color:var(--gold-hi)">${net.toLocaleString('en-US')}<small>${T('cur')}</small></div></div>
      <div class="dcard emer"><div class="lbl">${T('received')}</div><div class="v">${recv.toLocaleString('en-US')}<small>${T('cur')}</small></div></div>
      <div class="dcard warn"><div class="lbl">${T('delayedTotal')}</div><div class="v">${delT.toLocaleString('en-US')}<small>${T('cur')}</small></div></div>
    </div>
    <div class="hlcard"><div class="lbl">${T('expectedThis')}</div><div class="v">${cur(expThis)}</div></div>`;

  h+=`<div class="secttl">${T('salaries')}</div>
    <div class="iform"><div class="two"><div><label>${T('salCompany')}</label><input id="sCo" placeholder="${T('salCompanyPH')}"></div>
      <div><label>${T('salAmount')}</label><input id="sAmt" type="number" inputmode="numeric" placeholder="${T('salAmountPH')}"></div></div>
      <button onclick="addSalary()">${T('addSalaryBtn')}</button></div>`;
  if(salaries.length){salaries.forEach(s=>{h+=`<div class="sal"><span class="src">${esc(s.source)}</span>
      <span style="display:flex;gap:10px;align-items:center"><span class="amt">${Number(s.amount).toLocaleString('en-US')}<small>${T('cur')}/${lang==='ar'?'شهر':'mo'}</small></span>
      <span class="xdel" onclick="delSalary('${s.id}')">✕</span></span></div>`;});}
  else{h+=`<div class="empty" style="padding:18px">${T('noSalary')}</div>`;}

  h+=`<div class="secttl">${T('addUnitTitle')}</div>
    <div class="iform"><label>${T('unitName')}</label><input id="uName" placeholder="${T('unitNamePH')}">
    <div class="two"><div><label>${T('unitVal')}</label><input id="uVal" type="number" inputmode="numeric" placeholder="2000000"></div>
    <div><label>${T('rate')}</label><input id="uRate" type="number" inputmode="decimal" placeholder="2.5"></div></div>
    <label>${T('dueWhen')}</label><input id="uDue" type="month" value="${ymNext}">
    <button onclick="addUnit()">${T('addUnitBtn')}</button></div>`;

  if(!units.length){h+=`<div class="empty">${coinSVG()}${T('noComm')}</div>`;}
  h+=section(T('dueThis'),thisB)+section(T('dueNext'),nextB)+section(T('laterSec'),laterB)+section(T('delayedSec'),delayed)+section(T('paidSec'),paidU);

  h+=`<div class="secttl">${T('orientTitle')}</div>
    <div class="iform teal"><div class="two"><div><label>${T('company')}</label><input id="oCo" placeholder="${T('companyPH')}"></div>
      <div><label>${T('date')}</label><input id="oDate" type="date"></div></div><button onclick="addOrient()">${T('addOrientBtn')}</button></div>`;
  if(orients.length){[...orients].reverse().forEach(o=>{h+=`<div class="orient"><div><span class="o-co">${esc(o.company)}</span></div>
      <div style="display:flex;gap:10px;align-items:center"><span class="o-dt">${fdate(o.ts)}</span><span class="xdel" onclick="delOrient('${o.id}')">✕</span></div></div>`;});
    h+=`<button class="clearall" onclick="clearOrients()">${T('clearAll')}</button>`;}
  else{h+=`<div class="empty" style="padding:20px">${T('noOrient')}</div>`;}
  el.innerHTML=h;renderRing();}

function addSalary(){const co=document.getElementById('sCo').value.trim(),amt=parseFloat(document.getElementById('sAmt').value);
  if(!co||isNaN(amt)){alert(T('aFillSal'));return;}salaries.push({id:uid(),source:co,amount:amt});DB.set('salaries',salaries);renderMoney();}
function delSalary(id){if(confirm(T('qSal'))){salaries=salaries.filter(x=>x.id!==id);DB.set('salaries',salaries);renderMoney();}}
function addUnit(){const name=document.getElementById('uName').value.trim(),val=parseFloat(document.getElementById('uVal').value),rate=parseFloat(document.getElementById('uRate').value),due=document.getElementById('uDue').value||ymNext;
  if(!name||isNaN(val)||isNaN(rate)){alert(T('aFillUnit'));return;}units.unshift({id:uid(),name,value:val,rate,status:'pending',dueMonth:due,comment:''});DB.set('units',units);renderMoney();}
function markPaid(id){const u=units.find(x=>x.id===id);u.status='paid';DB.set('units',units);party();renderMoney();}
function markDelayed(id){const u=units.find(x=>x.id===id);openModal(T('whyDelayed'),T('reasonPH'),'',(r)=>{u.status='delayed';u.comment=r;DB.set('units',units);closeModal();renderMoney();},true,u.comment);}
function editComment(id){const u=units.find(x=>x.id===id);openModal(T('whyDelayed'),T('reasonPH'),'',(r)=>{u.comment=r;DB.set('units',units);closeModal();renderMoney();},true,u.comment);}
function unDelay(id){const u=units.find(x=>x.id===id);u.status='pending';DB.set('units',units);renderMoney();}
function unPay(id){const u=units.find(x=>x.id===id);u.status='pending';DB.set('units',units);renderMoney();}
function delUnit(id){if(confirm(T('qUnit'))){units=units.filter(x=>x.id!==id);DB.set('units',units);renderMoney();}}
function addOrient(){const co=document.getElementById('oCo').value.trim(),dt=document.getElementById('oDate').value;
  if(!co){alert(T('aFillCo'));return;}const d=dt?new Date(dt):new Date();orients.push({id:uid(),company:co,ts:d.getTime()});DB.set('orients',orients);renderMoney();}
function delOrient(id){orients=orients.filter(x=>x.id!==id);DB.set('orients',orients);renderMoney();}
function clearOrients(){if(confirm(T('qClear'))){orients=[];DB.set('orients',orients);renderMoney();}}

/* ============ DIN ============ */
function renderDin(){const el=document.getElementById('tab-din');const done=DIN.filter(i=>din.items[i]).length;const p=Math.round(done/DIN.length*100);
  let h=`<div class="rowhead"><h2>${T('myWird')}</h2><span style="font-size:13px;color:var(--gold-hi);font-family:Cairo">${done}/${DIN.length}</span></div>
    <div class="card"><div class="bar gold"><i style="width:${p}%"></i></div><div style="text-align:center;font-size:13px;color:var(--muted);margin-top:6px">${p===100?T('wirdDone'):T('wirdReset')}</div></div>`;
  DIN.forEach(id=>{const on=!!din.items[id];h+=`<div class="card" style="padding:0"><div class="lesson ${on?'done':''}" style="border:none;padding:12px 14px">
    <div class="check gold ${on?'on':''}" onclick="toggleDin('${id}')">${on?'✓':''}</div><span class="lt">${T(id)}</span></div></div>`;});
  el.innerHTML=h;renderRing();}
function toggleDin(id){din.items[id]=!din.items[id];DB.set('din',din);if(DIN.every(i=>din.items[i]))party();renderDin();}

/* ============ COURSES ============ */
function courseP(c){return c.lessons.length?Math.round(c.lessons.filter(l=>l.done).length/c.lessons.length*100):0;}
function renderCourses(){const el=document.getElementById('tab-courses');
  let h=`<div class="rowhead"><h2>${T('myCourses')}</h2><button class="addbtn" onclick="addCourse()">${T('courseBtn')}</button></div>`;
  if(!courses.length){h+=`<div class="empty">${bookSVG()}${T('noCourses')}</div>`;}
  courses.forEach(c=>{const p=courseP(c);h+=`<div class="card ${c.open?'open':''}"><div class="course-top" onclick="toggleCourse('${c.id}')"><div style="flex:1"><h3>${esc(c.name)}</h3>
    <div class="bar"><i style="width:${p}%"></i></div><div class="meta"><span>${c.lessons.filter(l=>l.done).length}/${c.lessons.length} ${T('videoU')}</span>
    ${c.link?`<a href="${esc(c.link)}" target="_blank" onclick="event.stopPropagation()">${T('openLink')}</a>`:''}</div></div>
    <div style="text-align:center"><div class="pct">${p}%</div><div class="chev">⌄</div></div></div><div class="lessons">`;
    c.lessons.forEach(l=>{h+=`<div class="lesson ${l.done?'done':''}"><div class="check ${l.done?'on':''}" onclick="toggleLesson('${c.id}','${l.id}')">${l.done?'✓':''}</div>
      <span class="lt">${esc(l.title)}</span>${l.link?`<a class="go" href="${esc(l.link)}" target="_blank">▶</a>`:''}<span class="del" onclick="delLesson('${c.id}','${l.id}')">✕</span></div>`;});
    h+=`<button class="addlesson" onclick="addLesson('${c.id}')">${T('addLesson')}</button><div style="text-align:center"><button class="delcourse" onclick="delCourse('${c.id}')">${T('delCourse')}</button></div></div></div>`;});
  el.innerHTML=h;renderRing();}
function addCourse(){openModal(T('newCourse'),T('courseName'),T('ytLink'),(n,l)=>{if(!n)return;courses.push({id:uid(),name:n,link:l,open:true,lessons:[]});DB.set('courses',courses);closeModal();renderCourses();});}
function addLesson(cid){openModal(T('lessonT'),T('videoTitle'),T('videoLink'),(t,l)=>{if(!t)return;courses.find(c=>c.id===cid).lessons.push({id:uid(),title:t,link:l,done:false});DB.set('courses',courses);closeModal();renderCourses();});}
function toggleCourse(id){const c=courses.find(x=>x.id===id);c.open=!c.open;DB.set('courses',courses);renderCourses();}
function toggleLesson(cid,lid){const c=courses.find(x=>x.id===cid),l=c.lessons.find(x=>x.id===lid);l.done=!l.done;DB.set('courses',courses);if(courseP(c)===100)party();renderCourses();}
function delLesson(cid,lid){const c=courses.find(x=>x.id===cid);c.lessons=c.lessons.filter(x=>x.id!==lid);DB.set('courses',courses);renderCourses();}
function delCourse(id){if(confirm(T('qCourse'))){courses=courses.filter(x=>x.id!==id);DB.set('courses',courses);renderCourses();}}

/* ============ PRICES ============ */
function renderPrices(){const el=document.getElementById('tab-prices');const last=prices[prices.length-1],prev=prices[prices.length-2];
  const diff=(c,o)=>o==null||o===c?{c:'same',t:'—'}:c>o?{c:'up',t:'▲ '+(c-o).toFixed(2)}:{c:'down',t:'▼ '+(o-c).toFixed(2)};
  const g=last?diff(last.gold,prev?.gold):{c:'same',t:'—'},d=last?diff(last.dollar,prev?.dollar):{c:'same',t:'—'};
  let h=`<div class="rowhead"><h2>${T('pricesT')}</h2></div><div class="price-cards">
    <div class="pcard"><div class="lbl">${T('gold')}</div><div class="val">${last?last.gold+T('cur'):'—'}</div><div class="chg ${g.c}">${g.t}</div></div>
    <div class="pcard"><div class="lbl">${T('dollar')}</div><div class="val">${last?last.dollar+T('cur'):'—'}</div><div class="chg ${d.c}">${d.t}</div></div></div>
    <div class="iform teal"><label>${T('goldIn')}</label><input id="pgold" type="number" inputmode="decimal" placeholder="${T('goldPH')}">
    <label>${T('dollarIn')}</label><input id="pdollar" type="number" inputmode="decimal" placeholder="${T('dollarPH')}"><button onclick="savePrice()">${T('updatePrices')}</button></div>`;
  if(prices.length){h+=`<div class="hist"><div class="rowhead"><h2 style="font-size:14px">${T('log')}</h2></div>`;
    [...prices].reverse().slice(0,8).forEach(p=>{h+=`<div class="h"><span>${fdate(p.ts)}</span><span>${T('gold').split(' ')[0]} ${p.gold} · ${T('dollar')} ${p.dollar}</span></div>`;});h+=`</div>`;}
  el.innerHTML=h;}
function savePrice(){const g=parseFloat(document.getElementById('pgold').value),d=parseFloat(document.getElementById('pdollar').value);
  if(isNaN(g)||isNaN(d)){alert(T('aFillPr'));return;}prices.push({gold:g,dollar:d,ts:Date.now()});DB.set('prices',prices);renderPrices();}

/* ============ READ ============ */
function renderRead(){const el=document.getElementById('tab-read');
  let h=`<div class="rowhead"><h2>${T('readLater')}</h2><button class="addbtn" onclick="addRead()">${T('addBtn')}</button></div>`;
  if(!reads.length){h+=`<div class="empty">${starSVG()}${T('noReads')}</div>`;}
  reads.forEach(r=>{h+=`<div class="card" style="padding:12px 14px"><div class="lesson" style="border:none;padding:2px 0">
    <div class="check ${r.done?'on':''}" onclick="toggleRead('${r.id}')">${r.done?'✓':''}</div>
    <span class="lt" style="${r.done?'color:var(--muted);text-decoration:line-through':''}">${esc(r.title)}</span>
    ${r.link?`<a class="go" href="${esc(r.link)}" target="_blank">↗</a>`:''}<span class="del" onclick="delRead('${r.id}')">✕</span></div></div>`;});
  el.innerHTML=h;}
function addRead(){openModal(T('readT'),T('ttl'),T('linkOpt'),(t,l)=>{if(!t)return;reads.unshift({id:uid(),title:t,link:l,done:false});DB.set('reads',reads);closeModal();renderRead();});}
function toggleRead(id){const r=reads.find(x=>x.id===id);r.done=!r.done;DB.set('reads',reads);renderRead();}
function delRead(id){reads=reads.filter(x=>x.id!==id);DB.set('reads',reads);renderRead();}

/* ============ ring / svg / nav ============ */
let curTab='money';
function renderRing(){const done=DIN.filter(i=>din.items[i]).length,p=Math.round(done/DIN.length*100),circ=97.4;
  document.getElementById('ringFill').style.strokeDashoffset=circ-(circ*p/100);document.getElementById('ringTxt').textContent=p+'%';
  document.getElementById('ovSmall').textContent=curTab==='money'?T('ovWork'):T('ovWird');
  document.getElementById('ovLabel').textContent=p===0?T('ovStart'):p===100?T('ovDone'):p+T('ovPct');}
function coinSVG(){return `<svg viewBox="0 0 64 64"><circle cx="32" cy="32" r="26" fill="#2A2413" stroke="#D4AF37" stroke-width="3"/><text x="32" y="42" text-anchor="middle" font-size="28" fill="#E8CC7A" font-family="Cairo" font-weight="800">$</text></svg>`;}
function bookSVG(){return `<svg viewBox="0 0 64 64"><rect x="12" y="14" width="40" height="36" rx="4" fill="#12291F" stroke="#2FA37F" stroke-width="3"/><path d="M32 18v28" stroke="#2FA37F" stroke-width="3"/></svg>`;}
function starSVG(){return `<svg viewBox="0 0 64 64"><path d="M32 8l7 16 17 2-13 11 4 17-15-9-15 9 4-17L8 26l17-2z" fill="#2A2413" stroke="#D4AF37" stroke-width="3" stroke-linejoin="round"/></svg>`;}
function renderNav(){document.querySelectorAll('.nav button').forEach(b=>{b.querySelector('.lb').textContent=T(b.dataset.tab);});}
function renderAll(){renderMoney();renderCourses();renderDin();renderPrices();renderRead();}
document.querySelectorAll('.nav button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');curTab=b.dataset.tab;
  ['money','courses','din','prices','read'].forEach(t=>{document.getElementById('tab-'+t).style.display=(t===b.dataset.tab)?'block':'none';});renderRing();window.scrollTo(0,0);};});
function toggleLang(){lang=lang==='ar'?'en':'ar';DB.set('lang',lang);applyLang();}
function applyLang(){document.documentElement.lang=lang;document.documentElement.dir=lang==='ar'?'rtl':'ltr';document.body.classList.toggle('en',lang==='en');
  document.getElementById('langtog').textContent=lang==='ar'?'EN':'ع';renderNav();renderAll();}
applyLang();
</script>
<script>
// Register Service Worker for PWA
if('serviceWorker' in navigator){
  const swCode = `self.addEventListener('install',e=>{e.waitUntil(caches.open('life-v1').then(c=>c.addAll(['./'])));self.skipWaiting();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`;
  const swBlob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
</script>
</body>
